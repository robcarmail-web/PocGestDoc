<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POC Delibere - Editor TipTap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tiptap/extension-bubble-menu@2/dist/bubble-menu.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tiptap/extension-floating-menu@2/dist/floating-menu.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 { color: #333; font-size: 28px; margin-bottom: 20px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 13px;
        }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .editors-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 30px 0;
        }

        .editor-wrapper h3 {
            color: #0066cc;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .editor-toolbar {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            gap: 2px;
            border-right: 1px solid #ddd;
            padding-right: 8px;
            margin-right: 8px;
        }
        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            padding: 8px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            min-width: 30px;
            text-align: center;
        }
        .toolbar-btn:hover {
            background: #e8f0ff;
            border-color: #0066cc;
            color: #0066cc;
        }
        .toolbar-btn.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .editor-content {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            font-size: 14px;
            line-height: 1.6;
        }

        .editor-content h1 { font-size: 24px; margin: 15px 0 10px; }
        .editor-content h2 { font-size: 20px; margin: 15px 0 10px; }
        .editor-content h3 { font-size: 18px; margin: 12px 0 8px; }
        .editor-content p { margin-bottom: 10px; }
        .editor-content ul, .editor-content ol { margin: 10px 0 10px 20px; }
        .editor-content li { margin-bottom: 5px; }
        .editor-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        .editor-content table td,
        .editor-content table th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        .ProseMirror {
            outline: none;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }
        button.btn-primary {
            padding: 12px 30px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        button.btn-primary:hover {
            background: #0052a3;
        }

        .status {
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POC Delibere - Editor TipTap Avanzato</h1>

        <form id="mainForm" enctype="multipart/form-data">
            <!-- Placeholder Semplici -->
            <div class="form-grid">
                <div class="form-group">
                    <label>Numero Proposta</label>
                    <input type="text" name="numeroproposta" value="2024/001">
                </div>
                <div class="form-group">
                    <label>Data Proposta</label>
                    <input type="text" name="dataproposta" value="15/01/2024">
                </div>
                <div class="form-group">
                    <label>Oggetto</label>
                    <input type="text" name="oggetto" value="Approvazione Piano Operativo">
                </div>
                <div class="form-group">
                    <label>Estensore</label>
                    <input type="text" name="EstensoreNome" value="Dott. Mario Rossi">
                </div>
                <div class="form-group">
                    <label>Direttore Generale</label>
                    <input type="text" name="DirGenNome" value="Prof. Roberto Blu">
                </div>
            </div>

            <!-- Editor TipTap -->
            <h2 style="color: #0066cc; margin-top: 30px; margin-bottom: 20px;">Contenuti Testo Ricco</h2>

            <div class="editors-container">
                <!-- Editor 1: Istruttoria -->
                <div class="editor-wrapper">
                    <h3>Relazione Istruttoria</h3>
                    <div class="editor-toolbar">
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleBold('editor1')" title="Bold">
                                <strong>B</strong>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleItalic('editor1')" title="Italic">
                                <em>I</em>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleUnderline('editor1')" title="Underline">
                                <u>U</u>
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleHeading('editor1', 1)" title="Heading 1">
                                H1
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleHeading('editor1', 2)" title="Heading 2">
                                H2
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleBullet('editor1')" title="Bullet List">
                                •
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleOrdered('editor1')" title="Ordered List">
                                1.
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="insertTable('editor1')" title="Insert Table">
                                ⊞
                            </button>
                        </div>
                    </div>
                    <div id="editor1" class="editor-content" contenteditable="true"></div>
                    <input type="hidden" name="tiptap_istruttoria" id="json_istruttoria">
                </div>

                <!-- Editor 2: Proposta -->
                <div class="editor-wrapper">
                    <h3>Proposta</h3>
                    <div class="editor-toolbar">
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleBold('editor2')">
                                <strong>B</strong>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleItalic('editor2')">
                                <em>I</em>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleUnderline('editor2')">
                                <u>U</u>
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleBullet('editor2')">
                                •
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleOrdered('editor2')">
                                1.
                            </button>
                        </div>
                    </div>
                    <div id="editor2" class="editor-content" contenteditable="true"></div>
                    <input type="hidden" name="tiptap_proposta" id="json_proposta">
                </div>

                <!-- Editor 3: Delibera -->
                <div class="editor-wrapper">
                    <h3>Delibera</h3>
                    <div class="editor-toolbar">
                        <div class="toolbar-group">
                            <button type="button" class="toolbar-btn" onclick="toggleBold('editor3')">
                                <strong>B</strong>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleItalic('editor3')">
                                <em>I</em>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="toggleUnderline('editor3')">
                                <u>U</u>
                            </button>
                        </div>
                    </div>
                    <div id="editor3" class="editor-content" contenteditable="true"></div>
                    <input type="hidden" name="tiptap_delibera" id="json_delibera">
                </div>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-primary" onclick="submitForm(event)">
                    Genera Documento ODT
                </button>
            </div>

            <div id="status" class="status"></div>
        </form>
    </div>

    <script>
        // Toolbar commands
        function toggleBold(editorId) {
            document.execCommand('bold');
            document.getElementById(editorId).focus();
        }

        function toggleItalic(editorId) {
            document.execCommand('italic');
            document.getElementById(editorId).focus();
        }

        function toggleUnderline(editorId) {
            document.execCommand('underline');
            document.getElementById(editorId).focus();
        }

        function toggleHeading(editorId, level) {
            document.execCommand('formatBlock', false, '<h' + level + '>');
            document.getElementById(editorId).focus();
        }

        function toggleBullet(editorId) {
            document.execCommand('insertUnorderedList');
            document.getElementById(editorId).focus();
        }

        function toggleOrdered(editorId) {
            document.execCommand('insertOrderedList');
            document.getElementById(editorId).focus();
        }

        function insertTable(editorId) {
            const html = '<table style="border-collapse: collapse; width: 100%;"><tr><td style="border: 1px solid black; padding: 8px;">Cell 1</td><td style="border: 1px solid black; padding: 8px;">Cell 2</td></tr><tr><td style="border: 1px solid black; padding: 8px;">Cell 3</td><td style="border: 1px solid black; padding: 8px;">Cell 4</td></tr></table>';
            document.execCommand('insertHTML', false, html);
            document.getElementById(editorId).focus();
        }

        // Convert editor content to TipTap JSON
        function editorToTipTap(editorId) {
            const elem = document.getElementById(editorId);
            const content = [];

            // Simple conversion of HTML to TipTap
            const html = elem.innerHTML;

            // For now, wrap everything as paragraphs with basic formatting
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            // Parse child elements
            tempDiv.childNodes.forEach(node => {
                if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                    content.push({
                        type: 'paragraph',
                        content: [{type: 'text', text: node.textContent}]
                    });
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    const tag = node.tagName.toLowerCase();

                    if (tag === 'p') {
                        content.push({
                            type: 'paragraph',
                            content: [{type: 'text', text: node.innerText || ''}]
                        });
                    } else if (tag === 'ul' || tag === 'ol') {
                        const listItems = [];
                        node.querySelectorAll('li').forEach(li => {
                            listItems.push({
                                type: 'listItem',
                                content: [{
                                    type: 'paragraph',
                                    content: [{type: 'text', text: li.innerText}]
                                }]
                            });
                        });
                        content.push({
                            type: tag === 'ul' ? 'bulletList' : 'orderedList',
                            content: listItems
                        });
                    } else if (tag === 'table') {
                        const rows = [];
                        node.querySelectorAll('tr').forEach(tr => {
                            const cells = [];
                            tr.querySelectorAll('td, th').forEach(td => {
                                cells.push({
                                    type: 'tableCell',
                                    content: [{
                                        type: 'paragraph',
                                        content: [{type: 'text', text: td.innerText}]
                                    }]
                                });
                            });
                            rows.push({type: 'tableRow', content: cells});
                        });
                        content.push({type: 'table', content: rows});
                    } else if (tag === 'h1' || tag === 'h2' || tag === 'h3') {
                        content.push({
                            type: 'paragraph',
                            content: [{type: 'text', text: node.innerText}]
                        });
                    }
                }
            });

            return {type: 'doc', content: content};
        }

        function submitForm(event) {
            event.preventDefault();
            showStatus('Generazione documento...', 'loading');

            const form = document.getElementById('mainForm');
            const formData = new FormData(form);

            // Convert editors to TipTap JSON
            const editors = {
                'tiptap_istruttoria': 'editor1',
                'tiptap_proposta': 'editor2',
                'tiptap_delibera': 'editor3'
            };

            for (const [name, elemId] of Object.entries(editors)) {
                const tiptapData = editorToTipTap(elemId);
                formData.set(name, JSON.stringify(tiptapData));
            }

            fetch('/api/genera', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error); });
                }
                return response.blob().then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'delibera.odt';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showStatus('Documento generato e scaricato!', 'success');
                });
            })
            .catch(error => {
                showStatus('Errore: ' + error.message, 'error');
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        // Initialize editors with placeholder text
        window.addEventListener('load', () => {
            document.getElementById('editor1').innerHTML = '<p>Scrivi la relazione istruttoria qui...</p>';
            document.getElementById('editor2').innerHTML = '<p>Scrivi la proposta qui...</p>';
            document.getElementById('editor3').innerHTML = '<p>Scrivi il dispositivo della delibera qui...</p>';
        });
    </script>
</body>
</html>
