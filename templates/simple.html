<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POC Delibera - Semplificato</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .mode-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .mode-btn.active {
            background: #667eea;
            color: white;
            border-bottom-color: #667eea;
        }

        .mode-content { display: none; }
        .mode-content.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 300px;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .toolbar button {
            padding: 8px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }
        .toolbar button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-generate:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }
        .status.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .status.loading {
            background: #d1ecf1;
            border: 2px solid #bee5eb;
            color: #0c5460;
            display: block;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POC Delibera</h1>
        <p class="subtitle">Genera delibere DOCX da DOCX o editor web</p>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('upload')">Upload DOCX</button>
            <button class="mode-btn" onclick="switchMode('editor')">Editor Web</button>
        </div>

        <!-- Mode 1: Upload DOCX -->
        <div id="upload" class="mode-content active">
            <div class="form-group">
                <label for="docx_file">Seleziona file DOCX</label>
                <input type="file" id="docx_file" accept=".docx">
                <p class="hint">Carica un documento Word con il contenuto della delibera</p>
            </div>
            <button class="btn-generate" onclick="submitUpload()">Genera DOCX</button>
        </div>

        <!-- Mode 2: Editor Web -->
        <div id="editor" class="mode-content">
            <div class="form-group">
                <label>Scrivi il contenuto della delibera</label>
                <div class="toolbar">
                    <button type="button" onclick="applyFormat('bold')" title="Bold"><strong>B</strong></button>
                    <button type="button" onclick="applyFormat('italic')" title="Italic"><em>I</em></button>
                    <button type="button" onclick="applyFormat('underline')" title="Underline"><u>U</u></button>
                    <span style="flex: 1;"></span>
                    <button type="button" onclick="applyFormat('insertUnorderedList')" title="Bullet List">•</button>
                    <button type="button" onclick="applyFormat('insertOrderedList')" title="Numbered List">1.</button>
                </div>
                <textarea id="editor_content" placeholder="Scrivi qui il contenuto della delibera..."></textarea>
                <p class="hint">Puoi usare la toolbar per aggiungere formattazione</p>
            </div>
            <button class="btn-generate" onclick="submitEditor()">Genera DOCX</button>
        </div>

        <!-- Status -->
        <div id="status" class="status"></div>
    </div>

    <script>
        function switchMode(mode) {
            // Hide all
            document.querySelectorAll('.mode-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));

            // Show selected
            document.getElementById(mode).classList.add('active');
            event.target.classList.add('active');
        }

        function applyFormat(command) {
            document.execCommand(command);
            document.getElementById('editor_content').focus();
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function submitUpload() {
            const file = document.getElementById('docx_file').files[0];
            if (!file) {
                showStatus('Seleziona un file DOCX', 'error');
                return;
            }

            showStatus('Generazione in corso...', 'loading');

            const formData = new FormData();
            formData.append('docx_file', file);

            fetch('/api/genera', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error); });
                }
                return response.blob().then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'delibera.docx';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showStatus('✅ Documento generato e scaricato!', 'success');
                });
            })
            .catch(error => {
                showStatus('❌ Errore: ' + error.message, 'error');
            });
        }

        function submitEditor() {
            const content = document.getElementById('editor_content').value;
            if (!content.trim()) {
                showStatus('Scrivi il contenuto della delibera', 'error');
                return;
            }

            showStatus('Generazione in corso...', 'loading');

            // Convert text to simple TipTap JSON
            const tiptapData = {
                type: 'doc',
                content: [{
                    type: 'paragraph',
                    content: [{
                        type: 'text',
                        text: content
                    }]
                }]
            };

            const formData = new FormData();
            formData.append('editor_content', JSON.stringify(tiptapData));

            fetch('/api/genera', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error); });
                }
                return response.blob().then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'delibera.docx';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showStatus('✅ Documento generato e scaricato!', 'success');
                });
            })
            .catch(error => {
                showStatus('❌ Errore: ' + error.message, 'error');
            });
        }
    </script>
</body>
</html>
